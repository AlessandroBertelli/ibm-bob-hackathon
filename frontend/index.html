        <div id="root"></div>

        <!--
            Crawler-visible content. Search engines and AI assistants that don't
            execute JavaScript get a real description here, plus links to the
            indexable static pages so they can keep crawling.
        -->
        <noscript>
            <main style="font-family: system-ui, sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 1.25rem; line-height: 1.5; color: #f3f4f6; background: #061224;">
                <h1>atavola — group meal planning by swiping</h1>
                <p>
                    atavola turns "what should we eat tonight?" into a 60-second swipe.
                    A host picks a vibe, the AI generates four meal ideas with images
                    and ingredient lists, then the group votes on a public link
                    (right swipe = like, left = dislike). The results screen re-ranks
                    in real time and never locks — anyone with the link keeps voting
                    until the group lands on something.
                </p>
                <p>
                    Free, no app to install, no account required to vote. Hosts sign in
                    with a magic-link email and can save favourite meals for later
                    sessions.
                </p>
                <p>
                    JavaScript is required to use the app itself.
                </p>
                <h2>More information</h2>

                </ul>
                <p style="margin-top: 2rem; font-size: 0.85rem; color: #9ca3af;">
                    Built with Supabase, Vercel, OpenRouter, Pollinations, Hugging Face
                    and Cloudflare Workers AI. Open-source, non-commercial, hackathon-born.
                </p>
            </main>
        </noscript>
