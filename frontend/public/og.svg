<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="atavola — group meal planning by swiping">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#061224" />
            <stop offset="100%" stop-color="#1a0f08" />
        </linearGradient>
        <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#fb923c" />
            <stop offset="100%" stop-color="#ef4444" />
        </linearGradient>
        <radialGradient id="glow" cx="80%" cy="20%" r="60%">
            <stop offset="0%" stop-color="#fb923c" stop-opacity="0.35" />
            <stop offset="100%" stop-color="#fb923c" stop-opacity="0" />
        </radialGradient>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg)" />
    <rect width="1200" height="630" fill="url(#glow)" />

    <!-- Accent strip top -->
    <rect x="0" y="0" width="1200" height="6" fill="url(#accent)" />

    <!-- Three stacked card silhouettes (the swipe deck) -->
    <g transform="translate(770 130) rotate(-6)">
        <rect width="280" height="380" rx="28" fill="#ffffff" opacity="0.08" />
    </g>
    <g transform="translate(810 105) rotate(-2)">
        <rect width="280" height="380" rx="28" fill="#ffffff" opacity="0.14" />
    </g>
    <g transform="translate(840 90) rotate(3)">
        <rect width="280" height="380" rx="28" fill="#ffffff" opacity="0.96" />
        <!-- Card image area -->
        <rect x="20" y="20" width="240" height="200" rx="18" fill="url(#accent)" />
        <circle cx="80" cy="120" r="22" fill="#fff" opacity="0.85" />
        <circle cx="160" cy="120" r="34" fill="#fff" opacity="0.95" />
        <!-- Title bar -->
        <rect x="20" y="240" width="200" height="14" rx="7" fill="#1f2937" />
        <rect x="20" y="266" width="160" height="10" rx="5" fill="#9ca3af" />
        <rect x="20" y="284" width="180" height="10" rx="5" fill="#9ca3af" />
        <!-- Heart -->
        <path d="M 230 250 a 14 14 0 0 1 14 -14 a 14 14 0 0 1 14 14 a 14 14 0 0 1 -14 14 a 14 14 0 0 1 -14 -14 z" fill="none" stroke="#ef4444" stroke-width="3" />
    </g>

    <!-- Brand wordmark -->
    <text x="80" y="200" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="124" font-weight="800" fill="#ffffff" letter-spacing="-2">atavola</text>

    <!-- Tagline -->
    <text x="80" y="280" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="40" font-weight="500" fill="#fb923c">group meal planning</text>
    <text x="80" y="330" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="40" font-weight="500" fill="#fb923c">by swiping</text>

    <!-- Bullet list of value props -->
    <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#e5e7eb" font-weight="400">
        <text x="80" y="430">→  Pick a vibe, AI generates four meal ideas</text>
        <text x="80" y="466">→  Group votes on a public link, no app needed</text>
        <text x="80" y="502">→  Live results re-rank as votes come in</text>
    </g>

    <!-- Footer URL -->
    <text x="80" y="580" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="22" fill="#fb923c" font-weight="600">atavola.ch</text>

    <!-- Subtle "free" pill -->
    <g transform="translate(280 555)">
        <rect width="92" height="36" rx="18" fill="#fb923c" />
        <text x="46" y="23" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2937">FREE</text>
    </g>

    <!-- Accent strip bottom -->
    <rect x="0" y="624" width="1200" height="6" fill="url(#accent)" />
</svg>
